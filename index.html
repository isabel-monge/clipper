<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shotstack Video Clipper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 16px; padding: 36px; max-width: 640px; width: 100%; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  p.sub { color: #666; font-size: 14px; margin-bottom: 28px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333; }
  .drop { border: 2px dashed #ddd; border-radius: 10px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; }
  .drop:hover, .drop.over { border-color: #0071e3; background: #f0f7ff; }
  .drop input { display: none; }
  .drop-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-text { color: #666; font-size: 14px; }
  .drop-text span { color: #0071e3; font-weight: 500; cursor: pointer; }
  .file-name { font-size: 13px; color: #333; margin-top: 8px; font-weight: 500; }
  textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 13px; font-family: monospace; resize: vertical; min-height: 120px; margin-bottom: 20px; }
  textarea:focus { outline: none; border-color: #0071e3; }
  button { width: 100%; background: #0071e3; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  button:hover:not(:disabled) { background: #0058b0; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .progress { margin-top: 20px; display: none; }
  .bar-bg { background: #eee; border-radius: 99px; height: 6px; margin-bottom: 10px; }
  .bar { background: #0071e3; height: 6px; border-radius: 99px; width: 0%; transition: width 0.4s; }
  .status { font-size: 13px; color: #555; }
  .results { margin-top: 24px; display: none; }
  .results h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
  .clip { background: #f5f5f7; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .clip-name { font-size: 14px; font-weight: 500; }
  .clip-status { font-size: 12px; color: #666; margin-top: 2px; }
  .dl { background: #0071e3; color: white; border: none; border-radius: 7px; padding: 8px 14px; font-size: 13px; cursor: pointer; text-decoration: none; white-space: nowrap; }
  .error { background: #fff0f0; color: #c0392b; border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-top: 16px; display: none; word-break: break-all; }
</style>
</head>
<body>
<div class="card">
  <h1>Video Clipper</h1>
  <p class="sub">Upload a video, paste your clips JSON, and we'll generate your clips automatically.</p>

  <label>1. Upload your video</label>
  <div class="drop" id="drop" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="video/*">
    <div class="drop-icon">📁</div>
    <div class="drop-text">Drag & drop or <span>browse</span></div>
    <div class="file-name" id="fileName"></div>
  </div>

  <label>2. Paste your clips JSON</label>
  <textarea id="clipsJson" placeholder='[{"label":"Clip 1","start":0,"end":10},{"label":"Clip 2","start":15,"end":30}]'></textarea>

  <button id="runBtn" onclick="run()" disabled>Run</button>

  <div class="progress" id="progress">
    <div class="bar-bg"><div class="bar" id="bar"></div></div>
    <div class="status" id="statusText">Starting...</div>
  </div>

  <div class="error" id="errorBox"></div>

  <div class="results" id="results">
    <h2>Your clips</h2>
    <div id="clipList"></div>
  </div>
</div>

<script>
const N8N_UPLOAD = 'https://learnwiseai.app.n8n.cloud/webhook/shotstack-upload';
const N8N_STATUS = 'https://learnwiseai.app.n8n.cloud/webhook/shotstack-status';
const SHOTSTACK_KEY = '43ozwA5mE1lKfvM2mGbW4TGnaVrCGCxWpo06DIWg';

let selectedFile = null;

const drop = document.getElementById('drop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); setFile(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => setFile(e.target.files[0]));

function setFile(f) {
  if (!f) return;
  selectedFile = f;
  document.getElementById('fileName').textContent = f.name;
  checkReady();
}

document.getElementById('clipsJson').addEventListener('input', checkReady);
function checkReady() {
  document.getElementById('runBtn').disabled = !(selectedFile && document.getElementById('clipsJson').value.trim());
}

function setStatus(msg, pct) {
  document.getElementById('progress').style.display = 'block';
  document.getElementById('statusText').textContent = msg;
  if (pct !== undefined) document.getElementById('bar').style.width = pct + '%';
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.style.display = 'block';
  el.textContent = 'Error: ' + msg;
}

async function run() {
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('runBtn').disabled = true;

  let clips;
  try {
    clips = JSON.parse(document.getElementById('clipsJson').value.trim());
    if (!Array.isArray(clips)) throw new Error();
  } catch {
    showError('Invalid JSON. Format: [{"label":"Clip 1","start":0,"end":10}]');
    document.getElementById('runBtn').disabled = false;
    return;
  }

  try {
    // Step 1: Ask n8n for a signed S3 upload URL
    setStatus('Getting upload URL...', 10);
    const urlRes = await fetch(N8N_UPLOAD, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'getUploadUrl' })
    });
    if (!urlRes.ok) throw new Error('n8n upload URL request failed: HTTP ' + urlRes.status);
    const urlData = await urlRes.json();
    console.log('Upload URL response:', JSON.stringify(urlData));

    const uploadUrl = urlData.data?.attributes?.url || urlData.uploadUrl || urlData.url;
    const sourceId  = urlData.data?.id             || urlData.sourceId  || urlData.id;
    if (!uploadUrl || !sourceId) throw new Error('Missing upload URL or source ID. Got: ' + JSON.stringify(urlData));

    // Step 2: PUT file directly to S3
    setStatus('Uploading video to S3...', 25);
    const s3Res = await fetch(uploadUrl, {
      method: 'PUT',
      headers: { 'Content-Type': selectedFile.type || 'video/mp4' },
      body: selectedFile
    });
    console.log('S3 upload status:', s3Res.status, s3Res.statusText);
    if (!s3Res.ok) throw new Error('S3 upload failed: HTTP ' + s3Res.status + ' ' + s3Res.statusText);

    // Step 3: Poll via n8n until source is ready
    setStatus('Processing video (this can take a few minutes)...', 40);
    const sourceUrl = await pollSourceViaN8n(sourceId);

    // Step 4: Submit render jobs
    setStatus('Submitting clips...', 65);
    const renderIds = await Promise.all(clips.map(clip => submitRender(sourceUrl, clip)));

    // Step 5: Poll renders
    setStatus('Rendering clips...', 78);
    const downloadUrls = await pollRenders(renderIds, clips);

    // Done
    document.getElementById('results').style.display = 'block';
    const list = document.getElementById('clipList');
    list.innerHTML = '';
    downloadUrls.forEach((url, i) => {
      list.innerHTML += '<div class="clip"><div><div class="clip-name">' + (clips[i].label || 'Clip ' + (i+1)) + '</div><div class="clip-status">Ready</div></div><a class="dl" href="' + url + '" target="_blank">Download</a></div>';
    });
    setStatus('Done!', 100);

  } catch (err) {
    showError(err.message);
    document.getElementById('runBtn').disabled = false;
  }
}

async function pollSourceViaN8n(sourceId) {
  for (let i = 0; i < 40; i++) {
    await sleep(5000);
    setStatus('Processing video... checking status (' + (i+1) + '/40)', 40 + i);
    const res = await fetch(N8N_STATUS, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sourceId })
    });
    if (!res.ok) throw new Error('Status check failed: HTTP ' + res.status);
    const data = await res.json();
    console.log('Source status response:', JSON.stringify(data));
    const status = data.data?.attributes?.status;
    if (status === 'ready') return data.data.attributes.source;
    if (status === 'failed') throw new Error('Shotstack source processing failed.');
  }
  throw new Error('Timed out: video took too long to process (>3 mins).');
}

async function submitRender(sourceUrl, clip) {
  const payload = {
    timeline: { tracks: [{ clips: [{ asset: { type: 'video', src: sourceUrl, trim: clip.start }, start: 0, length: clip.end - clip.start }] }] },
    output: { format: 'mp4', resolution: 'sd' }
  };
  const res = await fetch('https://api.shotstack.io/v1/render', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': SHOTSTACK_KEY },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!data.response?.id) throw new Error('Render submit failed: ' + JSON.stringify(data));
  return data.response.id;
}

async function pollRenders(ids, clips) {
  const results = new Array(ids.length).fill(null);
  for (let attempt = 0; attempt < 60; attempt++) {
    await sleep(5000);
    let done = 0;
    for (let i = 0; i < ids.length; i++) {
      if (results[i]) { done++; continue; }
      const res = await fetch('https://api.shotstack.io/v1/render/' + ids[i], {
        headers: { 'x-api-key': SHOTSTACK_KEY }
      });
      const data = await res.json();
      const st = data.response?.status;
      if (st === 'done') { results[i] = data.response.url; done++; }
      else if (st === 'failed') throw new Error('Clip "' + (clips[i].label || i) + '" failed to render.');
    }
    setStatus('Rendering... ' + done + '/' + ids.length + ' clips done', 78 + Math.round((done / ids.length) * 18));
    if (done === ids.length) return results;
  }
  throw new Error('Timed out waiting for clips to render.');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
